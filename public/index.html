<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisperLink - قناة تواصل مشفرة</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; margin-bottom: 30px; color: #00d9ff; }
    
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    
    .btn {
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border: none;
      padding: 15px 30px;
      border-radius: 25px;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      margin: 10px 0;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn-secondary { background: rgba(255,255,255,0.2); color: #fff; }
    
    input {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #00d9ff;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 18px;
      text-align: center;
      margin: 10px 0;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    
    #chatArea { display: none; }
    #messages {
      height: 400px;
      overflow-y: auto;
      margin-bottom: 15px;
    }
    .message {
      padding: 12px 16px;
      margin: 8px 0;
      border-radius: 15px;
      max-width: 80%;
      word-wrap: break-word;
    }
    .message.sent {
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      color: #1a1a2e;
      margin-left: auto;
      border-bottom-left-radius: 2px;
    }
    .message.received {
      background: rgba(255,255,255,0.15);
      border-bottom-right-radius: 2px;
    }
    .copy-btn {
      background: rgba(0,0,0,0.3);
      border: none;
      padding: 4px 10px;
      border-radius: 5px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      margin-right: 8px;
    }
    
    .file-area {
      border: 2px dashed #00d9ff;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      margin: 15px 0;
      cursor: pointer;
    }
    .file-area:hover { background: rgba(0,217,255,0.1); }
    
    .status {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
    }
    .status.connected { background: rgba(0,255,136,0.2); color: #00ff88; }
    .status.waiting { background: rgba(255,200,0,0.2); color: #ffc800; }
    .status.error { background: rgba(255,0,0,0.2); color: #ff4444; }
    
    .room-code {
      font-size: 32px;
      letter-spacing: 8px;
      font-weight: bold;
      color: #00d9ff;
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 WhisperLink</h1>
    
    <!-- Welcome Screen -->
    <div id="welcomeArea" class="card">
      <button class="btn" onclick="createRoom()">إنشاء قناة جديدة</button>
      <button class="btn btn-secondary" onclick="showJoin()">الانضمام لقناة</button>
    </div>
    
    <!-- Join Screen -->
    <div id="joinArea" class="card" style="display:none;">
      <h2>أدخل رمز القناة</h2>
      <input type="text" id="roomCodeInput" placeholder="مثل: 12345" maxlength="5">
      <button class="btn" onclick="joinRoom()">دخول</button>
      <button class="btn btn-secondary" onclick="showWelcome()">رجوع</button>
    </div>
    
    <!-- Room Info -->
    <div id="roomInfo" class="card" style="display:none;">
      <div id="shareCode"></div>
      <p style="text-align:center;margin:10px 0;">شارك هذا الرمز مع الطرف الآخر</p>
      <div id="connectionStatus" class="status waiting">في انتظار الاتصال...</div>
      <button class="btn" onclick="startChat()">بدء المحادثة</button>
    </div>
    
    <!-- Chat Area -->
    <div id="chatArea">
      <div id="messages"></div>
      <div class="file-area" onclick="sendFile()">
        📎 أرسل ملف
        <input type="file" id="fileInput" style="display:none" onchange="handleFile(this)">
      </div>
      <div style="display:flex;gap:10px;">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter')sendMsg()">
        <button class="btn" style="width:auto;margin:10px 0;" onclick="sendMsg()">إرسال</button>
      </div>
    </div>
  </div>

  <script>
    const SIGNAL_URL = 'https://whisper-link-signal.hmsathayrt1-crypto.workers.dev';
    let roomId = null;
    let peerId = Math.random().toString(36).substr(2, 9);
    let peerConnection = null;
    let dataChannel = null;
    let pollingInterval = null;

    // Generate random room ID (5 digits)
    function generateRoomId() {
      return Math.floor(10000 + Math.random() * 90000).toString();
    }

    async function createRoom() {
      roomId = generateRoomId();
      document.getElementById('welcomeArea').style.display = 'none';
      document.getElementById('roomInfo').style.display = 'block';
      document.getElementById('shareCode').innerHTML = `<div class="room-code">${roomId}</div>`;
      
      // Start polling for peer connection
      startPolling();
      
      // Create WebRTC offer
      await createWebRTCConnection(true);
    }

    function showJoin() {
      document.getElementById('welcomeArea').style.display = 'none';
      document.getElementById('joinArea').style.display = 'block';
    }

    function showWelcome() {
      document.getElementById('joinArea').style.display = 'none';
      document.getElementById('welcomeArea').style.display = 'block';
    }

    async function joinRoom() {
      roomId = document.getElementById('roomCodeInput').value;
      if (!roomId || roomId.length !== 5) {
        alert('يرجى إدخال رمز صحيح!');
        return;
      }
      
      document.getElementById('joinArea').style.display = 'none';
      document.getElementById('roomInfo').style.display = 'block';
      document.getElementById('shareCode').innerHTML = `<div class="room-code">${roomId}</div>`;
      
      startPolling();
      await createWebRTCConnection(false);
    }

    async function createWebRTCConnection(isInitiator) {
      peerConnection = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });

      peerConnection.onicecandidate = async (e) => {
        if (e.candidate) {
          await fetch(`${SIGNAL_URL}/signal`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomId, peerId, type: 'candidate', payload: e.candidate })
          });
        }
      };

      peerConnection.onconnectionstatechange = () => {
        const status = document.getElementById('connectionStatus');
        if (peerConnection.connectionState === 'connected') {
          status.className = 'status connected';
          status.textContent = '✅ متصل!';
        }
      };

      if (isInitiator) {
        dataChannel = peerConnection.createDataChannel('data');
        setupDataChannel();
        
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        await fetch(`${SIGNAL_URL}/signal`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ roomId, peerId, type: 'offer', payload: offer })
        });
      } else {
        peerConnection.ondatachannel = (e) => {
          dataChannel = e.channel;
          setupDataChannel();
        };
      }
    }

    function setupDataChannel() {
      dataChannel.onopen = () => {
        document.getElementById('connectionStatus').className = 'status connected';
        document.getElementById('connectionStatus').textContent = '✅ متصل!';
      };
      
      dataChannel.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'file') {
          receiveFile(msg);
        } else {
          addMessage(msg.text, 'received');
        }
      };
    }

    function startPolling() {
      pollingInterval = setInterval(async () => {
        try {
          const resp = await fetch(`${SIGNAL_URL}/signal?roomId=${roomId}&peerId=${peerId}`);
          const data = await resp.json();
          
          for (const signal of data.signals) {
            if (signal.type === 'offer' || signal.type === 'answer') {
              const desc = new RTCSessionDescription(signal.payload);
              await peerConnection.setRemoteDescription(desc);
              
              if (signal.type === 'offer') {
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                await fetch(`${SIGNAL_URL}/signal`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ roomId, peerId, type: 'answer', payload: answer })
                });
              }
            } else if (signal.type === 'candidate') {
              await peerConnection.addIceCandidate(new RTCIceCandidate(signal.payload));
            }
          }
        } catch (e) {
          console.log('Polling...');
        }
      }, 2000);
    }

    function startChat() {
      document.getElementById('roomInfo').style.display = 'none';
      document.getElementById('chatArea').style.display = 'block';
    }

    function sendMsg() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !dataChannel || dataChannel.readyState !== 'open') return;
      
      dataChannel.send(JSON.stringify({ type: 'text', text }));
      addMessage(text, 'sent');
      input.value = '';
    }

    function addMessage(text, type) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `<span>${escapeHtml(text)}</span><button class="copy-btn" onclick="copyText(this)">📋 نسخ</button>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function copyText(btn) {
      const text = btn.previousElementSibling.textContent;
      navigator.clipboard.writeText(text);
      btn.textContent = '✅';
      setTimeout(() => btn.textContent = '📋 نسخ', 1500);
    }

    function sendFile() {
      document.getElementById('fileInput').click();
    }

    function handleFile(input) {
      const file = input.files[0];
      if (!file || !dataChannel || dataChannel.readyState !== 'open') return;
      
      const reader = new FileReader();
      reader.onload = () => {
        dataChannel.send(JSON.stringify({
          type: 'file',
          name: file.name,
          data: reader.result
        }));
        addMessage(`📎 ${file.name}`, 'sent');
      };
      reader.readAsDataURL(file);
    }

    function receiveFile(msg) {
      addMessage(`📎 <a href="${msg.data}" download="${msg.name}">${msg.name}</a>`, 'received');
    }
  </script>
</body>
</html>
